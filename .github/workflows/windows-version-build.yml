name: Build & Release FlyEnv (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (optional, e.g. v1.0.0)'
        required: false

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC (for node-gyp)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'src/helper-go/go.mod'
          cache-dependency-path: 'src/helper-go/go.sum'

      - name: Enable Yarn (Corepack)
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .yarn/cache
            ~/.cache/node-gyp
            ~\AppData\Local\node-gyp
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}

      - name: Install dependencies (Yarn 4)
        run: |
          npm install -g node-gyp
          $env:LINK = "runtimeobject.lib"
          yarn install

      - name: Build Go helper
        run: |
          go install github.com/tc-hib/go-winres@latest

          $GOBIN = (go env GOPATH) + "\bin"
          $env:PATH = "$GOBIN;$env:PATH"

          cd src/helper-go
          go mod download
          go-winres make
          .\build-win.ps1

      - name: Build + Publish Electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn build --publish always
