name: Build & Release FlyEnv (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ 修复 node-gyp / native 依赖
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'src/helper-go/go.mod'
          cache-dependency-path: 'src/helper-go/go.sum'

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .yarn/cache
            ~/.cache/node-gyp
            ~\AppData\Local\node-gyp
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}

      # ✅ ✅ ✅ 关键修复：禁止 install 阶段 build（否则 CI 会炸）
      - name: Install dependencies
        run: |
          npm install -g node-gyp
          $env:LINK = "runtimeobject.lib"
          yarn install --mode=skip-build

      - name: Build Go helper
        run: |
          go install github.com/tc-hib/go-winres@latest

          $GOBIN = (go env GOPATH) + "\bin"
          $env:PATH = "$GOBIN;$env:PATH"

          cd src/helper-go
          go mod download
          go-winres make
          .\build-win.ps1

      # ✅ 真正构建（这里才执行 build）
      - name: Build + Publish Electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn build --publish always
