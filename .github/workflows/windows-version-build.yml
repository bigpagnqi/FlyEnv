name: Build & Release FlyEnv (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # ✅ ✅ ✅ 改成 Node 24（你要的）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'src/helper-go/go.mod'
          cache-dependency-path: 'src/helper-go/go.sum'

      # ✅ 强制 Actions 用 Node 24（避免警告）
      - name: Enable Node 24 for actions
        run: |
          echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $env:GITHUB_ENV

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      # ✅ 不使用 cache（避免旧依赖污染）
      - name: Install dependencies
        run: |
          npm install -g node-gyp
          $env:LINK = "runtimeobject.lib"
          yarn install --mode=skip-build

      - name: Build Go helper
        run: |
          go install github.com/tc-hib/go-winres@latest

          $GOBIN = (go env GOPATH) + "\bin"
          $env:PATH = "$GOBIN;$env:PATH"

          cd src/helper-go
          go mod download
          go-winres make
          .\build-win.ps1

      # ✅ Electron 构建
      - name: Build App
        run: |
          yarn build

      # ✅ 打包 + 发布
      - name: Package + Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --publish always
