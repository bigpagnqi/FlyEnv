name: Build & Release FlyEnv (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'   # ✅ 最新稳定

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'src/helper-go/go.mod'

      # ✅ 强制 action 走 Node 24（避免未来炸）
      - name: Force Node 24
        run: |
          echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $env:GITHUB_ENV

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      # ✅ 安装依赖（绝对不能 build）
      - name: Install dependencies
        run: |
          npm install -g node-gyp
          $env:LINK = "runtimeobject.lib"
          yarn install --mode=skip-build

      # ✅ 构建 Go 工具
      - name: Build Go helper
        run: |
          go install github.com/tc-hib/go-winres@latest
          $GOBIN = (go env GOPATH) + "\bin"
          $env:PATH = "$GOBIN;$env:PATH"

          cd src/helper-go
          go mod download
          go-winres make
          .\build-win.ps1

      # ✅ 构建前端
      - name: Build App
        run: |
          yarn build

      # ✅ ✅ ✅ 关键！！！禁止 electron rebuild native
      - name: Package + Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_SKIP_BINARY_DOWNLOAD: true
        run: |
          npx electron-builder --publish always --config.npmRebuild=false --config.buildDependenciesFromSource=false
